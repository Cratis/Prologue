name: .NET Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: "10.0.x"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "**"
    paths:
      - "Source/**"
      - "Samples/**"
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - ".github/workflows/dotnet-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .Net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Release is the warnings-as-errors gate. It also strips the inline specs (see
      # Source/Directory.Build.targets), so it builds only — the specs are run below.
      - name: Build (Release)
        run: dotnet build --configuration Release

      # The inline specs only exist in Debug, where each project doubles as its test project.
      # The Library sample's integration tests need Docker and browsers, so they are excluded here
      # and run locally; see Samples/Library/README.md.
      - name: Run specs (Debug)
        run: dotnet test --configuration Debug --filter "Category!=Integration"
